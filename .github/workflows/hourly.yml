name: SOCTRA Hourly Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show requirements.txt contents
        run: |
          echo "=== requirements.txt ==="
          cat requirements.txt
          echo "========================"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip cache purge
          python -m pip install --upgrade pip
          pip install --upgrade --force-reinstall -r requirements.txt
          python -c "import httpx, supabase; print('httpx:', httpx.__version__, '| supabase:', supabase.__version__)"

      - name: Verify secrets
        run: echo "Secrets loaded successfully"
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Execute scraper
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python run_job.py
